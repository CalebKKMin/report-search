<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수시보고서-연구용역 리스트 검색 시스템</title>

  <!-- Google API -->
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a3a5c 0%, #2563a8 100%);
      color: white;
      padding: 28px 24px 22px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { margin-top: 6px; font-size: 0.88rem; opacity: 0.82; }

    /* ── 탭 ── */
    .tab-bar {
      max-width: 1000px;
      margin: 28px auto 0;
      display: flex;
      gap: 0;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .tab-btn {
      flex: 1;
      padding: 16px 0;
      border: none;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: -0.3px;
    }
    .tab-btn.report {
      background: #e8f0fb;
      color: #2563a8;
      border-bottom: 3px solid transparent;
    }
    .tab-btn.research {
      background: #e8f5ee;
      color: #15803d;
      border-bottom: 3px solid transparent;
    }
    .tab-btn.report.active {
      background: white;
      color: #1a3a5c;
      border-bottom: 3px solid #2563a8;
    }
    .tab-btn.research.active {
      background: white;
      color: #15803d;
      border-bottom: 3px solid #15803d;
    }

    /* ── 공통 패널 ── */
    .search-panel {
      max-width: 1000px;
      margin: 0 auto 0;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      padding: 24px 28px;
    }

    .section { display: none; }
    .section.active { display: block; }

    .filter-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .filter-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .filter-group select,
    .filter-group input {
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.93rem;
      font-family: inherit;
      background: #f7fafc;
      transition: border-color 0.2s;
      outline: none;
    }
    .filter-group select:focus,
    .filter-group input:focus { border-color: #2563a8; background: white; }
    .filter-group.keyword { flex: 1; min-width: 220px; }
    .filter-group.keyword input { width: 100%; }

    .btn-row { display: flex; gap: 10px; margin-top: 14px; align-items: center; }
    button { padding: 10px 22px; border: none; border-radius: 8px; font-size: 0.93rem; font-family: inherit; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    button:active { transform: scale(0.97); }
    .btn-search { background: #2563a8; color: white; }
    .btn-search:hover { background: #1a4a8a; }
    .btn-search.green { background: #15803d; }
    .btn-search.green:hover { background: #166534; }
    .btn-reset { background: #e2e8f0; color: #4a5568; }
    .btn-reset:hover { background: #cbd5e0; }

    /* ── 연도 칩 ── */
    .year-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .year-chip {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #cbd5e0;
      background: white;
      color: #4a5568;
      font-size: 0.83rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.15s;
    }
    .year-chip:hover { border-color: #2563a8; color: #2563a8; }
    .year-chip.active { background: #2563a8; border-color: #2563a8; color: white; font-weight: 700; }
    .year-chip.all { background: #f0f4f8; }
    .year-chip.all.active { background: #e2e8f0; border-color: #94a3b8; color: #1a202c; }
    /* 연구용역 탭 칩 색상 */
    .green-chip:hover { border-color: #15803d; color: #15803d; }
    .green-chip.active { background: #15803d; border-color: #15803d; color: white; }
    .green-chip.all.active { background: #e2e8f0; border-color: #94a3b8; color: #1a202c; }

    /* ── 결과 메타 ── */
    .result-meta {
      max-width: 1000px;
      margin: 16px auto 8px;
      padding: 0 4px;
      font-size: 0.88rem;
      color: #718096;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-meta strong { color: #2d3748; }

    /* ── 테이블 ── */
    .table-wrap {
      max-width: 1000px;
      margin: 0 auto 40px;
      background: white;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead tr { background: #1a3a5c; color: white; }
    thead.green-head tr { background: #166534; }
    thead th { padding: 13px 16px; text-align: left; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.3px; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #edf2f7; transition: background 0.15s; }
    tbody tr:hover { background: #ebf4ff; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 11px 16px; color: #2d3748; vertical-align: middle; }

    /* 수시보고서 열 너비 */
    #reportTable thead th:nth-child(1),
    #reportTable td:nth-child(1) { width: 60px; text-align: center; color: #718096; font-size: 0.82rem; }
    #reportTable thead th:nth-child(2),
    #reportTable td:nth-child(2) { width: 70px; text-align: center; font-weight: 600; color: #2563a8; }
    #reportTable thead th:nth-child(3),
    #reportTable td:nth-child(3) { width: 80px; text-align: center; }

    /* 연구용역 열 너비 */
    #researchTable thead th:nth-child(1),
    #researchTable td:nth-child(1) { width: 60px; text-align: center; color: #718096; font-size: 0.82rem; }
    #researchTable thead th:nth-child(2),
    #researchTable td:nth-child(2) { width: 80px; text-align: center; font-weight: 600; color: #2d3748; }
    #researchTable thead th:nth-child(3),
    #researchTable td:nth-child(3) { min-width: 260px; white-space: nowrap; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
    .badge-국가 { background: #dbeafe; color: #1d4ed8; }
    .badge-산업 { background: #dcfce7; color: #15803d; }
    .badge-기타 { background: #fef9c3; color: #854d0e; }

    .highlight { background: #fef08a; border-radius: 2px; font-weight: 600; }

    /* ── 파일명 링크 ── */
    .file-link {
      color: #2563a8;
      text-decoration: none;
      cursor: pointer;
      border-bottom: 1px dashed #93c5fd;
      transition: color 0.15s, border-color 0.15s;
    }
    .file-link:hover {
      color: #1a4a8a;
      border-bottom-color: #2563a8;
    }

    .empty-state { text-align: center; padding: 60px 20px; color: #a0aec0; }
    .empty-state p { font-size: 1rem; }

    /* ── 페이지네이션 ── */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 16px; border-top: 1px solid #edf2f7; }
    .page-btn { padding: 6px 12px; border: 1.5px solid #cbd5e0; border-radius: 6px; background: white; color: #4a5568; font-size: 0.85rem; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .page-btn:hover { border-color: #2563a8; color: #2563a8; }
    .page-btn.active { background: #2563a8; border-color: #2563a8; color: white; font-weight: 700; }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Google Drive 모달 ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: white;
      border-radius: 14px;
      width: 100%;
      max-width: 860px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
      flex-shrink: 0;
    }
    .modal-header-title {
      font-size: 0.93rem;
      font-weight: 700;
      color: #1a3a5c;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100% - 60px);
    }
    .modal-close-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      color: #718096;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close-btn:hover { background: #e2e8f0; color: #2d3748; }
    .modal-body {
      flex: 1;
      overflow: auto;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }
    .modal-body iframe {
      flex: 1;
      width: 100%;
      border: none;
      min-height: 480px;
    }
    .modal-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 30px;
      gap: 18px;
      text-align: center;
      flex: 1;
    }
    .modal-center p { color: #4a5568; font-size: 0.95rem; line-height: 1.6; }
    .modal-center .sub { color: #a0aec0; font-size: 0.83rem; }
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 22px;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
      flex-shrink: 0;
    }
    .btn-gdrive {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn-gdrive.download { background: #2563a8; color: white; }
    .btn-gdrive.download:hover { background: #1a4a8a; }
    .btn-gdrive.open { background: #e8f0fb; color: #2563a8; border: 1.5px solid #bfdbfe; }
    .btn-gdrive.open:hover { background: #dbeafe; }
    .btn-gdrive.signin { background: #2563a8; color: white; padding: 12px 28px; font-size: 0.95rem; }
    .btn-gdrive.signin:hover { background: #1a4a8a; }
    .btn-gdrive:disabled { opacity: 0.5; cursor: default; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563a8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-error-icon { font-size: 2.5rem; }
    .modal-auth-icon { font-size: 2.8rem; }

    @media (max-width: 640px) {
      header h1 { font-size: 1.2rem; }
      .search-panel { padding: 16px; }
      .filter-row { flex-direction: column; }
      .modal-body iframe { min-height: 300px; }
    }
  </style>
</head>
<body>

<header>
  <h1>수시보고서-연구용역 리스트 검색 시스템</h1>
  <p>수시보고서(2019~2026) 및 연구용역 통합 검색</p>
</header>

<!-- 탭 -->
<div class="tab-bar">
  <button class="tab-btn report active" onclick="switchTab('report')">📄 수시보고서</button>
  <button class="tab-btn research" onclick="switchTab('research')">🔬 연구용역</button>
</div>

<!-- ══════════════════════════════════════
     수시보고서 섹션
══════════════════════════════════════ -->
<div class="search-panel">
  <div class="section active" id="reportSection">
    <div style="margin-bottom:16px;">
      <div style="font-size:0.8rem;font-weight:600;color:#4a5568;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">연도</div>
      <div class="year-chips" id="reportYearChips"></div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>분류</label>
        <select id="reportCategory">
          <option value="">전체</option>
          <option value="국가">국가</option>
          <option value="산업">산업</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="filter-group keyword">
        <label>파일명 검색 (일부 단어 입력)</label>
        <input type="text" id="reportKeyword" placeholder="예: FDI, 미중, 반도체, 투자..." autocomplete="off" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-search" onclick="searchReport()">검색</button>
      <button class="btn-reset" onclick="resetReport()">초기화</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       연구용역 섹션
  ══════════════════════════════════════ -->
  <div class="section" id="researchSection">
    <div style="margin-bottom:16px;">
      <div style="font-size:0.8rem;font-weight:600;color:#4a5568;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">연도</div>
      <div class="year-chips" id="researchYearChips"></div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>발주처</label>
        <select id="researchClient">
          <option value="">전체</option>
        </select>
      </div>
      <div class="filter-group keyword">
        <label>연구용역명 검색 (일부 단어 입력)</label>
        <input type="text" id="researchKeyword" placeholder="예: FDI, 외투, 투자유치..." autocomplete="off" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-search green" onclick="searchResearch()">검색</button>
      <button class="btn-reset" onclick="resetResearch()">초기화</button>
    </div>
  </div>
</div>

<!-- 결과 메타 -->
<div class="result-meta" id="resultMeta" style="display:none;"></div>

<!-- 수시보고서 테이블 -->
<div class="table-wrap" id="reportTableWrap" style="display:none;">
  <table id="reportTable">
    <thead>
      <tr><th>#</th><th>연도</th><th>분류</th><th>파일명 (클릭하여 열기)</th></tr>
    </thead>
    <tbody id="reportBody"></tbody>
  </table>
  <div class="pagination" id="reportPagination"></div>
</div>

<!-- 연구용역 테이블 -->
<div class="table-wrap" id="researchTableWrap" style="display:none;">
  <table id="researchTable">
    <thead class="green-head">
      <tr><th>#</th><th>연도</th><th>발주처</th><th>연구용역명</th></tr>
    </thead>
    <tbody id="researchBody"></tbody>
  </table>
  <div class="pagination" id="researchPagination"></div>
</div>

<!-- ══════════════════════════════════════
     Google Drive 파일 뷰어 모달
══════════════════════════════════════ -->
<div id="driveModal" class="modal-overlay" style="display:none;" onclick="onModalOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-title" id="modalTitle">파일 보기</div>
      <button class="modal-close-btn" onclick="closeModal()" title="닫기">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-center">
        <div class="spinner"></div>
        <p>로딩 중...</p>
      </div>
    </div>
    <div class="modal-footer" id="modalFooter" style="display:none;">
      <button class="btn-gdrive download" id="modalDownloadBtn" onclick="downloadCurrentFile()">
        ⬇ 다운로드
      </button>
      <a class="btn-gdrive open" id="modalOpenBtn" href="#" target="_blank" rel="noopener">
        ↗ 드라이브에서 열기
      </a>
    </div>
  </div>
</div>

<script>
  /* ═══════════════════════════════════════
     ★ Google Drive 설정
     아래 두 값을 Google Cloud Console에서 발급받아 입력하세요.
     설정 방법: README 또는 아래 주석 참고
  ═══════════════════════════════════════ */
  const GDRIVE_CLIENT_ID = 'YOUR_OAUTH_CLIENT_ID.apps.googleusercontent.com';
  // API 키는 선택사항이지만 할당량 관리를 위해 권장합니다
  const GDRIVE_API_KEY   = 'YOUR_API_KEY';
  const GDRIVE_SCOPES    = 'https://www.googleapis.com/auth/drive.readonly';

  /* ═══════════════════════════════════════
     Google API 초기화
  ═══════════════════════════════════════ */
  let gapiInited = false;
  let gisInited  = false;
  let tokenClient = null;
  let currentFileId = null;
  let currentFileName = '';
  let pendingFile = null; // { filename, year }

  function gapiLoaded() {
    gapi.load('client', async () => {
      try {
        await gapi.client.init({
          apiKey: GDRIVE_API_KEY !== 'YOUR_API_KEY' ? GDRIVE_API_KEY : undefined,
          discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        });
        gapiInited = true;
      } catch (e) {
        console.warn('GAPI init error:', e);
      }
    });
  }

  function gisLoaded() {
    if (GDRIVE_CLIENT_ID === 'YOUR_OAUTH_CLIENT_ID.apps.googleusercontent.com') return;
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPES,
      callback: (resp) => {
        if (resp.error) {
          showModalError('Google 인증에 실패했습니다.<br><small>' + resp.error + '</small>');
          return;
        }
        if (pendingFile) {
          searchAndOpenFile(pendingFile.filename, pendingFile.year);
          pendingFile = null;
        }
      },
    });
    gisInited = true;
  }

  /* ═══════════════════════════════════════
     모달 제어
  ═══════════════════════════════════════ */
  function showModal(title) {
    currentFileId = null;
    currentFileName = title;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalFooter').style.display = 'none';
    document.getElementById('driveModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('driveModal').style.display = 'none';
    document.body.style.overflow = '';
    // iframe 제거 (메모리 해제)
    const body = document.getElementById('modalBody');
    body.innerHTML = '';
  }

  function onModalOverlayClick(e) {
    if (e.target === document.getElementById('driveModal')) closeModal();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  function showModalLoading() {
    document.getElementById('modalBody').innerHTML = `
      <div class="modal-center">
        <div class="spinner"></div>
        <p>Google Drive에서 파일을 검색 중입니다…</p>
      </div>`;
    document.getElementById('modalFooter').style.display = 'none';
  }

  function showModalError(msg) {
    document.getElementById('modalBody').innerHTML = `
      <div class="modal-center">
        <div class="modal-error-icon">⚠️</div>
        <p>${msg}</p>
        <p class="sub">파일명이 Google Drive와 다르거나 접근 권한이 없을 수 있습니다.</p>
      </div>`;
    document.getElementById('modalFooter').style.display = 'none';
  }

  function showModalContent(html) {
    document.getElementById('modalBody').innerHTML = html;
  }

  /* ═══════════════════════════════════════
     파일명 클릭 핸들러
  ═══════════════════════════════════════ */
  function onFilenameClick(event, filename, year) {
    event.preventDefault();
    showModal(filename);

    // 설정 미완료 시 안내
    if (GDRIVE_CLIENT_ID === 'YOUR_OAUTH_CLIENT_ID.apps.googleusercontent.com') {
      showModalContent(`
        <div class="modal-center">
          <div class="modal-auth-icon">⚙️</div>
          <p><strong>Google Drive 연동 설정이 필요합니다.</strong></p>
          <p class="sub">
            index.html 상단의 <code>GDRIVE_CLIENT_ID</code>와 <code>GDRIVE_API_KEY</code>를<br>
            Google Cloud Console에서 발급받아 입력해 주세요.
          </p>
        </div>`);
      return;
    }

    pendingFile = { filename, year };

    // GAPI / GIS 아직 로딩 중인 경우
    if (!gapiInited || !gisInited) {
      showModalContent(`
        <div class="modal-center">
          <div class="spinner"></div>
          <p>Google API 초기화 중…</p>
        </div>`);
      // 준비되면 자동 재시도
      const wait = setInterval(() => {
        if (gapiInited && gisInited) {
          clearInterval(wait);
          triggerAuth();
        }
      }, 200);
      return;
    }

    triggerAuth();
  }

  function triggerAuth() {
    const token = gapi.client.getToken();
    if (token === null) {
      // 로그인 필요
      showModalContent(`
        <div class="modal-center">
          <div class="modal-auth-icon">🔐</div>
          <p>파일을 열려면 Google 계정 인증이 필요합니다.<br>
             <span class="sub">kkmin2008@gmail.com 계정으로 로그인하세요.</span></p>
          <button class="btn-gdrive signin" onclick="requestGoogleAuth()">
            Google 계정으로 로그인
          </button>
        </div>`);
    } else {
      if (pendingFile) {
        searchAndOpenFile(pendingFile.filename, pendingFile.year);
        pendingFile = null;
      }
    }
  }

  function requestGoogleAuth() {
    if (!tokenClient) return;
    tokenClient.requestAccessToken({ prompt: '' });
  }

  /* ═══════════════════════════════════════
     Google Drive 파일 검색
  ═══════════════════════════════════════ */
  async function searchAndOpenFile(filename, year) {
    showModalLoading();

    try {
      // 1단계: 정확한 이름으로 검색
      let file = await findFileByName(filename);

      // 2단계: 이름에 포함된 핵심 키 부분으로 재검색 (확장자 차이 등 대응)
      if (!file) {
        // 예: "#19수시보고_001_..." → 앞 30자로 검색
        const shortName = filename.replace(/'/g, "\\'").substring(0, 40);
        file = await findFileByPartialName(shortName, year);
      }

      if (!file) {
        showModalError(`<strong>"${escHtml(filename)}"</strong> 파일을 Google Drive에서 찾을 수 없습니다.`);
        return;
      }

      openFileInModal(file);
    } catch (err) {
      if (err.status === 401) {
        // 토큰 만료 → 재인증
        pendingFile = { filename, year };
        tokenClient.requestAccessToken({ prompt: '' });
      } else {
        console.error(err);
        showModalError('파일 검색 중 오류가 발생했습니다.<br><small>' + (err.message || err) + '</small>');
      }
    }
  }

  async function findFileByName(filename) {
    const q = `name = '${filename.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}' and trashed = false and mimeType != 'application/vnd.google-apps.folder'`;
    const res = await gapi.client.drive.files.list({
      q,
      fields: 'files(id, name, mimeType, webViewLink)',
      pageSize: 5,
      spaces: 'drive',
    });
    return res.result.files && res.result.files.length > 0 ? res.result.files[0] : null;
  }

  async function findFileByPartialName(partialName, year) {
    // 연도 폴더 안에서 먼저 검색, 없으면 전체 검색
    const q = `name contains '${partialName}' and trashed = false and mimeType != 'application/vnd.google-apps.folder'`;
    const res = await gapi.client.drive.files.list({
      q,
      fields: 'files(id, name, mimeType, webViewLink, parents)',
      pageSize: 10,
      spaces: 'drive',
    });
    if (!res.result.files || res.result.files.length === 0) return null;

    // 여러 결과가 있으면 파일명이 가장 비슷한 것 반환
    return res.result.files[0];
  }

  /* ═══════════════════════════════════════
     모달에 파일 표시
  ═══════════════════════════════════════ */
  function openFileInModal(file) {
    currentFileId = file.id;
    const viewLink = file.webViewLink || `https://drive.google.com/file/d/${file.id}/view`;
    const previewUrl = `https://drive.google.com/file/d/${file.id}/preview`;

    document.getElementById('modalBody').innerHTML =
      `<iframe src="${previewUrl}" allowfullscreen></iframe>`;

    const openBtn = document.getElementById('modalOpenBtn');
    openBtn.href = viewLink;

    document.getElementById('modalFooter').style.display = 'flex';
  }

  /* ═══════════════════════════════════════
     다운로드
  ═══════════════════════════════════════ */
  async function downloadCurrentFile() {
    if (!currentFileId) return;

    const token = gapi.client.getToken();
    if (!token) { requestGoogleAuth(); return; }

    const btn = document.getElementById('modalDownloadBtn');
    btn.disabled = true;
    btn.textContent = '⬇ 다운로드 중…';

    try {
      const downloadUrl =
        `https://www.googleapis.com/drive/v3/files/${currentFileId}?alt=media`;

      const response = await fetch(downloadUrl, {
        headers: { Authorization: `Bearer ${token.access_token}` },
      });

      if (!response.ok) throw new Error('HTTP ' + response.status);

      const blob = await response.blob();
      const contentDisp = response.headers.get('content-disposition') || '';
      let fname = currentFileName;
      const m = contentDisp.match(/filename\*?=(?:UTF-8'')?([^;]+)/i);
      if (m) fname = decodeURIComponent(m[1].replace(/"/g, ''));

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    } catch (err) {
      console.error('Download error:', err);
      // 폴백: 드라이브에서 직접 열기
      window.open(`https://drive.google.com/uc?export=download&id=${currentFileId}`, '_blank');
    } finally {
      btn.disabled = false;
      btn.textContent = '⬇ 다운로드';
    }
  }

  /* ═══════════════════════════════════════
     공통 유틸
  ═══════════════════════════════════════ */
  const PAGE_SIZE = 30;

  function normalize(s) { return s.toLowerCase().replace(/\s+/g, ''); }

  function fuzzyMatch(text, keyword) {
    if (!keyword) return true;
    return keyword.trim().split(/\s+/).map(normalize).filter(Boolean)
      .every(t => normalize(text).includes(t));
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlight(text, keyword) {
    if (!keyword) return escHtml(text);
    let result = escHtml(text);
    keyword.trim().split(/\s+/).filter(Boolean).forEach(term => {
      result = result.replace(new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'),
        m => `<mark class="highlight">${m}</mark>`);
    });
    return result;
  }

  function renderPagination(containerId, total, current, onPage) {
    const el = document.getElementById(containerId);
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    const maxBtn = 7;
    let s = Math.max(1, current - Math.floor(maxBtn/2));
    let e = Math.min(totalPages, s + maxBtn - 1);
    if (e - s < maxBtn - 1) s = Math.max(1, e - maxBtn + 1);
    let html = `<button class="page-btn" onclick="${onPage}(${current-1})" ${current===1?'disabled':''}>&#8249;</button>`;
    if (s > 1) html += `<button class="page-btn" onclick="${onPage}(1)">1</button>${s>2?'<span style="padding:0 4px;color:#a0aec0">…</span>':''}`;
    for (let p = s; p <= e; p++)
      html += `<button class="page-btn${p===current?' active':''}" onclick="${onPage}(${p})">${p}</button>`;
    if (e < totalPages) html += `${e<totalPages-1?'<span style="padding:0 4px;color:#a0aec0">…</span>':''}<button class="page-btn" onclick="${onPage}(${totalPages})">${totalPages}</button>`;
    html += `<button class="page-btn" onclick="${onPage}(${current+1})" ${current===totalPages?'disabled':''}>&#8250;</button>`;
    el.innerHTML = html;
  }

  function buildYearChips(containerId, years, selectedSet, cssExtra, onToggle) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = `year-chip all ${cssExtra} active`;
    allBtn.textContent = '전체';
    allBtn.onclick = () => {
      selectedSet.clear();
      el.querySelectorAll('.year-chip').forEach(c => c.classList.remove('active'));
      allBtn.classList.add('active');
      onToggle();
    };
    el.appendChild(allBtn);
    years.forEach(y => {
      const btn = document.createElement('button');
      btn.className = `year-chip ${cssExtra}`;
      btn.textContent = y;
      btn.onclick = () => {
        if (selectedSet.has(y)) { selectedSet.delete(y); btn.classList.remove('active'); }
        else { selectedSet.add(y); btn.classList.add('active'); allBtn.classList.remove('active'); }
        if (selectedSet.size === 0) allBtn.classList.add('active');
        onToggle();
      };
      el.appendChild(btn);
    });
  }

  /* ═══════════════════════════════════════
     탭 전환
  ═══════════════════════════════════════ */
  let currentTab = 'report';

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn.${tab}`).classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(`${tab}Section`).classList.add('active');
    document.getElementById('resultMeta').style.display = 'none';
    document.getElementById('reportTableWrap').style.display = 'none';
    document.getElementById('researchTableWrap').style.display = 'none';
    if (tab === 'report') searchReport();
    else searchResearch();
  }

  /* ═══════════════════════════════════════
     수시보고서
  ═══════════════════════════════════════ */
  let reportData = [];
  let reportFiltered = [];
  let reportPage = 1;
  let reportYears = new Set();

  fetch('data/reports.json')
    .then(r => r.json())
    .then(data => {
      reportData = data;
      const years = [...new Set(data.map(d => d.year))].sort();
      buildYearChips('reportYearChips', years, reportYears, '', searchReport);
      searchReport();
    });

  function searchReport() {
    const kw = document.getElementById('reportKeyword').value;
    const cat = document.getElementById('reportCategory').value;
    reportFiltered = reportData.filter(d =>
      (reportYears.size === 0 || reportYears.has(d.year)) &&
      (!cat || d.category === cat) &&
      fuzzyMatch(d.filename, kw)
    );
    reportPage = 1;
    renderReport();
  }

  function resetReport() {
    document.getElementById('reportKeyword').value = '';
    document.getElementById('reportCategory').value = '';
    reportYears.clear();
    document.querySelectorAll('#reportYearChips .year-chip').forEach(c => c.classList.remove('active'));
    const allChip = document.querySelector('#reportYearChips .year-chip.all');
    if (allChip) allChip.classList.add('active');
    searchReport();
  }

  function goReportPage(p) {
    const total = Math.ceil(reportFiltered.length / PAGE_SIZE);
    if (p < 1 || p > total) return;
    reportPage = p;
    renderReport();
    document.getElementById('reportTableWrap').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function renderReport() {
    if (currentTab !== 'report') return;
    const kw = document.getElementById('reportKeyword').value;
    const total = reportFiltered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    reportPage = Math.min(reportPage, totalPages);
    const start = (reportPage - 1) * PAGE_SIZE;
    const pageData = reportFiltered.slice(start, start + PAGE_SIZE);

    document.getElementById('resultMeta').style.display = 'flex';
    document.getElementById('resultMeta').innerHTML =
      `검색 결과 <strong style="margin:0 4px;">${total.toLocaleString()}</strong>건 &nbsp;|&nbsp; 페이지 ${reportPage} / ${totalPages}`;
    document.getElementById('reportTableWrap').style.display = '';
    document.getElementById('researchTableWrap').style.display = 'none';

    if (total === 0) {
      document.getElementById('reportBody').innerHTML =
        '<tr><td colspan="4"><div class="empty-state"><p>검색 결과가 없습니다.</p></div></td></tr>';
      document.getElementById('reportPagination').innerHTML = '';
      return;
    }

    document.getElementById('reportBody').innerHTML = pageData.map((d, i) => {
      // 파일명에 포함된 작은따옴표를 이스케이프 (onclick 인자)
      const safeFilename = d.filename.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      const safeYear = d.year.replace(/'/g, "\\'");
      return `
      <tr>
        <td>${start + i + 1}</td>
        <td>${d.year}</td>
        <td><span class="badge badge-${d.category}">${d.category}</span></td>
        <td>
          <a href="#" class="file-link"
             onclick="onFilenameClick(event,'${safeFilename}','${safeYear}')"
             title="클릭하여 Google Drive에서 파일 열기">
            ${highlight(d.filename, kw)}
          </a>
        </td>
      </tr>`;
    }).join('');

    renderPagination('reportPagination', total, reportPage, 'goReportPage');
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('reportKeyword').addEventListener('input', searchReport);
    document.getElementById('reportCategory').addEventListener('change', searchReport);
    document.getElementById('reportKeyword').addEventListener('keydown', e => { if(e.key==='Enter') searchReport(); });
  });

  /* ═══════════════════════════════════════
     연구용역
  ═══════════════════════════════════════ */
  let researchData = [];
  let researchFiltered = [];
  let researchPage = 1;
  let researchYears = new Set();

  fetch('data/research.json')
    .then(r => r.json())
    .then(data => {
      researchData = data;
      const years = [...new Set(data.map(d => d.year))].sort();
      buildYearChips('researchYearChips', years, researchYears, 'green-chip', searchResearch);
      // 발주처 드롭다운
      const clients = [...new Set(data.map(d => d.client))].sort();
      const sel = document.getElementById('researchClient');
      clients.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
      document.getElementById('researchKeyword').addEventListener('input', searchResearch);
      document.getElementById('researchClient').addEventListener('change', searchResearch);
      document.getElementById('researchKeyword').addEventListener('keydown', e => { if(e.key==='Enter') searchResearch(); });
    });

  function searchResearch() {
    const kw = document.getElementById('researchKeyword').value;
    const client = document.getElementById('researchClient').value;
    researchFiltered = researchData.filter(d =>
      (researchYears.size === 0 || researchYears.has(d.year)) &&
      (!client || d.client === client) &&
      fuzzyMatch(d.title, kw)
    );
    researchPage = 1;
    renderResearch();
  }

  function resetResearch() {
    document.getElementById('researchKeyword').value = '';
    document.getElementById('researchClient').value = '';
    researchYears.clear();
    document.querySelectorAll('#researchYearChips .year-chip').forEach(c => c.classList.remove('active'));
    const allChip = document.querySelector('#researchYearChips .year-chip.all');
    if (allChip) allChip.classList.add('active');
    searchResearch();
  }

  function goResearchPage(p) {
    const total = Math.ceil(researchFiltered.length / PAGE_SIZE);
    if (p < 1 || p > total) return;
    researchPage = p;
    renderResearch();
    document.getElementById('researchTableWrap').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function renderResearch() {
    if (currentTab !== 'research') return;
    const kw = document.getElementById('researchKeyword').value;
    const total = researchFiltered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    researchPage = Math.min(researchPage, totalPages);
    const start = (researchPage - 1) * PAGE_SIZE;
    const pageData = researchFiltered.slice(start, start + PAGE_SIZE);

    document.getElementById('resultMeta').style.display = 'flex';
    document.getElementById('resultMeta').innerHTML =
      `검색 결과 <strong style="margin:0 4px;">${total.toLocaleString()}</strong>건 &nbsp;|&nbsp; 페이지 ${researchPage} / ${totalPages}`;
    document.getElementById('reportTableWrap').style.display = 'none';
    document.getElementById('researchTableWrap').style.display = '';

    if (total === 0) {
      document.getElementById('researchBody').innerHTML =
        '<tr><td colspan="4"><div class="empty-state"><p>검색 결과가 없습니다.</p></div></td></tr>';
      document.getElementById('researchPagination').innerHTML = '';
      return;
    }

    document.getElementById('researchBody').innerHTML = pageData.map((d, i) => `
      <tr>
        <td>${start + i + 1}</td>
        <td>${escHtml(d.year)}</td>
        <td>${highlight(d.client, kw)}</td>
        <td>${highlight(d.title, kw)}</td>
      </tr>`).join('');

    renderPagination('researchPagination', total, researchPage, 'goResearchPage');
  }
</script>
